<div style="max-width:800px;margin:40px auto;font-family:Arial">
  <h1>Enterprise AI Search</h1>

  <div>
    <input type="file" (change)="onFileSelected($event)" accept=".pdf,.txt">
    <button (click)="uploadFile()">Upload Document</button>
    <p>{{uploadStatus}}</p>
  </div>

  <div style="margin-top:20px">
    <input [(ngModel)]="query" placeholder="Ask a question..." style="width:70%;padding:8px">
    <button (click)="search()">Search</button>
  </div>

  <div *ngIf="answer" style="margin-top:20px;background:#f5f5f5;padding:16px">
    <h3>Answer</h3>
    <p>{{answer}}</p>
    <h4>Sources</h4>
    <div *ngFor="let s of sources" style="background:#fff;padding:8px;margin:4px 0">
  <strong>Score: {{s.score | number:'1.2-2'}}</strong><br>
  {{s.preview}}
</div>
  </div>
</div>
